<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL = 'https://wcmowsufrfrjajxpmcgn.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_onLuRLfVbViEQv2hdEuHtw_AbtPEr67';
const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const DAY_ABBR = ['DOM', 'SEG', 'TER', 'QUA', 'QUI', 'SEX', 'SAB'];
const MONTH_NAMES = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
const MONTH_ABBR = ['JAN','FEV','MAR','ABR','MAI','JUN','JUL','AGO','SET','OUT','NOV','DEZ'];

let selectedDate = null;
let currentFilter = 'dia';
let semanaOffset = 0;
let mesOffset = 0;

// ── Helpers ────────────────────────────────────────────────────────────────
function toYMD(date) {
  const y = date.getFullYear();
  const m = String(date.getMonth() + 1).padStart(2, '0');
  const d = String(date.getDate()).padStart(2, '0');
  return `${y}-${m}-${d}`;
}

function getWeekBounds(offset) {
  const now = new Date();
  const day = now.getDay();
  const monday = new Date(now);
  monday.setDate(now.getDate() - (day === 0 ? 6 : day - 1) + offset * 7);
  monday.setHours(0,0,0,0);
  const sunday = new Date(monday);
  sunday.setDate(monday.getDate() + 6);
  sunday.setHours(23,59,59,999);
  return { monday, sunday };
}

// ── Filter switching ───────────────────────────────────────────────────────
function setMobFilter(name) {
  currentFilter = name;

  ['dia','semana','mes'].forEach(f => {
    const btn = document.getElementById(`mob-filter-${f}`);
    if (f === name) {
      btn.className = 'px-5 py-2 rounded-full bg-gradient-to-br from-primary to-primary-container text-white text-sm font-semibold whitespace-nowrap shadow-sm';
    } else {
      btn.className = 'px-5 py-2 rounded-full bg-surface-container-low text-on-surface-variant text-sm font-medium whitespace-nowrap';
    }
  });

  document.getElementById('dia-view').classList.toggle('hidden', name !== 'dia');
  document.getElementById('semana-view').classList.toggle('hidden', name !== 'semana');
  document.getElementById('mes-view').classList.toggle('hidden', name !== 'mes');

  if (name === 'dia')    loadMetrics();
  if (name === 'semana') loadSemanaView();
  if (name === 'mes')    loadMesView();
}

// ── Metrics ────────────────────────────────────────────────────────────────
async function loadMetrics() {
  const now = new Date();
  const monthStart = new Date(now.getFullYear(), now.getMonth(), 1).toISOString();
  const monthEnd = new Date(now.getFullYear(), now.getMonth() + 1, 0, 23, 59, 59, 999).toISOString();
  const todayStart = new Date(now.getFullYear(), now.getMonth(), now.getDate()).toISOString();
  const todayEnd = new Date(now.getFullYear(), now.getMonth(), now.getDate(), 23, 59, 59, 999).toISOString();
  const monthNames = ['JAN','FEV','MAR','ABR','MAI','JUN','JUL','AGO','SET','OUT','NOV','DEZ'];
  document.getElementById('mes-label').textContent = monthNames[now.getMonth()];

  const [{ count: mesCount }, { count: hojeCount }] = await Promise.all([
    supabase.from('agendamentos').select('id', { count: 'exact', head: true }).gte('inicio', monthStart).lte('inicio', monthEnd),
    supabase.from('agendamentos').select('id', { count: 'exact', head: true }).gte('inicio', todayStart).lte('inicio', todayEnd),
  ]);

  const mes = mesCount ?? 0;
  const hoje = hojeCount ?? 0;
  document.getElementById('metric-agendamentos-mes').textContent = mes;
  document.getElementById('metric-agendamentos-hoje').textContent = hoje;
  document.getElementById('agendamentos-bar').style.width = `${Math.min(100, Math.round((mes / 30) * 100))}%`;
  document.getElementById('hoje-bar').style.width = `${Math.min(100, Math.round((hoje / 10) * 100))}%`;
}

// ── Date picker (DIA view) ─────────────────────────────────────────────────
function buildDatePicker(selectedYMD) {
  const today = new Date();
  const weekDates = getWeekDates(today);
  const picker = document.getElementById('date-picker');
  picker.innerHTML = '';

  weekDates.forEach(date => {
    const ymd = toYMD(date);
    const isActive = ymd === selectedYMD;
    const abbr = DAY_ABBR[date.getDay()];
    const dd = String(date.getDate()).padStart(2, '0');
    const el = document.createElement('div');

    if (isActive) {
      el.className = 'flex flex-col items-center justify-center min-w-[64px] py-4 rounded-xl bg-gradient-to-br from-primary to-primary-container text-white shadow-lg shadow-primary/20 cursor-pointer date-item';
      el.innerHTML = `<span class="text-[10px] font-bold uppercase opacity-90">${abbr}</span><span class="text-xl font-extrabold headline-font">${dd}</span><div class="w-1.5 h-1.5 bg-white rounded-full mt-1"></div>`;
    } else {
      el.className = 'flex flex-col items-center justify-center min-w-[56px] py-4 rounded-xl bg-surface-container-low text-on-surface-variant cursor-pointer date-item';
      el.innerHTML = `<span class="text-[10px] font-bold uppercase">${abbr}</span><span class="text-lg font-bold headline-font">${dd}</span>`;
    }

    el.dataset.date = ymd;
    el.addEventListener('click', () => {
      selectedDate = ymd;
      buildDatePicker(ymd);
      loadAgendamentos(ymd);
    });
    picker.appendChild(el);
  });
}

function getWeekDates(referenceDate) {
  const d = new Date(referenceDate);
  const dayOfWeek = d.getDay();
  const diffToMonday = (dayOfWeek === 0) ? -6 : 1 - dayOfWeek;
  const monday = new Date(d);
  monday.setDate(d.getDate() + diffToMonday);
  return Array.from({ length: 7 }, (_, i) => {
    const day = new Date(monday);
    day.setDate(monday.getDate() + i);
    return day;
  });
}

// ── Status badge ───────────────────────────────────────────────────────────
function statusBadge(status) {
  if (!status) return `<span class="text-[10px] px-2 py-0.5 rounded-full bg-surface-variant text-on-surface-variant font-medium">—</span>`;
  const s = status.toLowerCase();
  if (s === 'confirmado') return `<span class="text-[10px] px-2 py-0.5 rounded-full bg-tertiary-container/40 text-on-tertiary-container font-medium">Confirmado</span>`;
  if (s === 'aguardando' || s === 'agendado') return `<span class="text-[10px] px-2 py-0.5 rounded-full bg-secondary-container text-on-secondary-container font-medium">Aguardando</span>`;
  if (s === 'cancelado') return `<span class="text-[10px] px-2 py-0.5 rounded-full bg-primary/10 text-primary font-bold">Cancelado</span>`;
  if (s === 'concluido') return `<span class="text-[10px] px-2 py-0.5 rounded-full bg-tertiary-container text-on-tertiary-container font-medium">Concluído</span>`;
  return `<span class="text-[10px] px-2 py-0.5 rounded-full bg-surface-variant text-on-surface-variant font-medium">${status}</span>`;
}

function appointmentCardHTML(item) {
  const dt = new Date(item.inicio);
  const hours = dt.getHours();
  const minutes = String(dt.getMinutes()).padStart(2, '0');
  const ampm = hours >= 12 ? 'PM' : 'AM';
  const hours12 = hours % 12 || 12;
  const timeStr = `${String(hours12).padStart(2, '0')}:${minutes}`;
  const isUrgent = item.status === 'cancelado';
  const borderClass = isUrgent ? 'border-l-4 border-l-primary shadow-sm' : 'border border-outline-variant/10';

  return `
    <div class="flex gap-4 p-4 rounded-xl bg-surface-container-lowest ${borderClass}">
      <div class="flex flex-col items-center justify-center pr-4 border-r border-outline-variant/20 min-w-[60px]">
        <span class="text-xs font-bold headline-font ${isUrgent ? 'text-primary' : 'text-on-surface'}">${timeStr}</span>
        <span class="text-[10px] ${isUrgent ? 'text-primary/70' : 'text-on-surface-variant'} uppercase">${ampm}</span>
      </div>
      <div class="flex-1 flex justify-between items-start">
        <div class="space-y-1">
          <h4 class="font-bold text-sm text-on-surface">${item.paciente_nome || '—'}</h4>
          <p class="text-xs text-on-surface-variant">${item.procedimento_nome || '—'}</p>
          <div class="flex items-center gap-1 mt-2">${statusBadge(item.status)}</div>
        </div>
        <button class="text-outline"><span class="material-symbols-outlined">more_vert</span></button>
      </div>
    </div>`;
}

function renderGroupedByDay(containerEl, data, emptyMsg) {
  if (!data || data.length === 0) {
    containerEl.innerHTML = `<p class="text-sm text-on-surface-variant text-center py-8">${emptyMsg}</p>`;
    return;
  }
  const groups = {};
  data.forEach(a => {
    const day = toYMD(new Date(a.inicio));
    if (!groups[day]) groups[day] = [];
    groups[day].push(a);
  });
  containerEl.innerHTML = Object.keys(groups).sort().map(day => {
    const date = new Date(day + 'T12:00:00');
    const label = date.toLocaleDateString('pt-BR', { weekday: 'long', day: 'numeric', month: 'long' });
    return `
      <div class="space-y-3">
        <div class="flex items-center gap-3">
          <h4 class="headline-font font-bold text-sm text-on-surface capitalize">${label}</h4>
          <div class="h-px flex-1 bg-surface-container-high"></div>
          <span class="text-[10px] font-bold text-primary bg-primary-container/20 px-2 py-0.5 rounded-full">${groups[day].length}</span>
        </div>
        ${groups[day].map(a => appointmentCardHTML(a)).join('')}
      </div>`;
  }).join('');
}

// ── DIA: load appointments for one day ────────────────────────────────────
async function loadAgendamentos(ymd) {
  const listEl = document.getElementById('agendamentos-list');
  const countLabel = document.getElementById('agendamentos-count-label');
  listEl.innerHTML = `<div class="animate-pulse bg-surface-container-lowest rounded-xl h-20"></div><div class="animate-pulse bg-surface-container-lowest rounded-xl h-20"></div>`;
  countLabel.textContent = '';

  const { data, error } = await supabase
    .from('agendamentos')
    .select('id, inicio, paciente_nome, procedimento_nome, status')
    .gte('inicio', `${ymd}T00:00:00`)
    .lte('inicio', `${ymd}T23:59:59`)
    .order('inicio', { ascending: true });

  if (error) { listEl.innerHTML = `<p class="text-sm text-error text-center py-8">Erro ao carregar.</p>`; return; }
  if (!data || data.length === 0) { listEl.innerHTML = `<p class="text-sm text-on-surface-variant text-center py-8">Nenhum agendamento para este dia.</p>`; return; }

  countLabel.textContent = `${data.length} agendamento${data.length !== 1 ? 's' : ''}`;
  listEl.innerHTML = data.map(item => appointmentCardHTML(item)).join('');
}

// ── SEMANA view ────────────────────────────────────────────────────────────
async function loadSemanaView() {
  const { monday, sunday } = getWeekBounds(semanaOffset);
  const mondayStr = monday.toLocaleDateString('pt-BR', { day: 'numeric', month: 'short' });
  const sundayStr = sunday.toLocaleDateString('pt-BR', { day: 'numeric', month: 'short' });
  document.getElementById('semana-title').textContent = semanaOffset === 0 ? 'Esta Semana' : `${mondayStr} — ${sundayStr}`;

  const listEl = document.getElementById('semana-list');
  listEl.innerHTML = '<div class="animate-pulse bg-surface-container-lowest rounded-xl h-20"></div>';

  const { data } = await supabase
    .from('agendamentos')
    .select('id, inicio, paciente_nome, procedimento_nome, status')
    .gte('inicio', monday.toISOString())
    .lte('inicio', sunday.toISOString())
    .order('inicio', { ascending: true });

  // Days grid
  const today = toYMD(new Date());
  const dayCounts = {};
  (data || []).forEach(a => {
    const d = toYMD(new Date(a.inicio));
    dayCounts[d] = (dayCounts[d] || 0) + 1;
  });

  document.getElementById('semana-days-grid').innerHTML = Array.from({ length: 7 }, (_, i) => {
    const d = new Date(monday);
    d.setDate(monday.getDate() + i);
    const ymd = toYMD(d);
    const isToday = ymd === today;
    const count = dayCounts[ymd] || 0;
    const bg = isToday ? 'bg-gradient-to-br from-primary to-primary-container text-white' : 'bg-surface-container-lowest text-on-surface';
    return `
      <div class="rounded-xl p-2 text-center ${bg}">
        <p class="text-[9px] font-bold uppercase ${isToday ? 'text-white/80' : 'text-on-surface-variant'}">${DAY_ABBR[d.getDay()]}</p>
        <p class="text-base font-extrabold headline-font">${d.getDate()}</p>
        <p class="text-[9px] font-bold ${isToday ? 'text-white/90' : 'text-primary'}">${count > 0 ? count : '—'}</p>
      </div>`;
  }).join('');

  renderGroupedByDay(listEl, data, 'Nenhum agendamento esta semana.');
}

// ── MÊS view ───────────────────────────────────────────────────────────────
async function loadMesView() {
  const now = new Date();
  const year = now.getFullYear();
  const month = now.getMonth() + mesOffset;
  const baseDate = new Date(year, month, 1);
  const monthStart = new Date(baseDate.getFullYear(), baseDate.getMonth(), 1);
  const monthEnd = new Date(baseDate.getFullYear(), baseDate.getMonth() + 1, 0, 23, 59, 59);

  document.getElementById('mes-title').textContent = `${MONTH_NAMES[monthStart.getMonth()]} ${monthStart.getFullYear()}`;

  const listEl = document.getElementById('mes-list');
  listEl.innerHTML = '<div class="animate-pulse bg-surface-container-lowest rounded-xl h-20"></div>';

  const { data } = await supabase
    .from('agendamentos')
    .select('id, inicio, paciente_nome, procedimento_nome, status')
    .gte('inicio', monthStart.toISOString())
    .lte('inicio', monthEnd.toISOString())
    .order('inicio', { ascending: true });

  renderGroupedByDay(listEl, data, `Nenhum agendamento em ${MONTH_NAMES[monthStart.getMonth()]}.`);
}

// ── Session check ──────────────────────────────────────────────────────────
async function checkSession() {
  const session = await new Promise((resolve) => {
    const { data: { subscription } } = supabase.auth.onAuthStateChange((event, sess) => {
      if (event === 'INITIAL_SESSION') { subscription.unsubscribe(); resolve(sess); }
    });
  });
  if (!session) window.location.href = 'login-mobile.html';
}

// ── Event listeners ────────────────────────────────────────────────────────
document.getElementById('mob-filter-dia').addEventListener('click', () => setMobFilter('dia'));
document.getElementById('mob-filter-semana').addEventListener('click', () => setMobFilter('semana'));
document.getElementById('mob-filter-mes').addEventListener('click', () => setMobFilter('mes'));

document.getElementById('semana-prev-mob').addEventListener('click', () => { semanaOffset--; loadSemanaView(); });
document.getElementById('semana-next-mob').addEventListener('click', () => { semanaOffset++; loadSemanaView(); });
document.getElementById('mes-prev-mob').addEventListener('click', () => { mesOffset--; loadMesView(); });
document.getElementById('mes-next-mob').addEventListener('click', () => { mesOffset++; loadMesView(); });

// ── Init ───────────────────────────────────────────────────────────────────
(async () => {
  await checkSession();
  const today = new Date();
  selectedDate = toYMD(today);
  buildDatePicker(selectedDate);
  loadMetrics();
  loadAgendamentos(selectedDate);
})();
</script>
</body></html>
