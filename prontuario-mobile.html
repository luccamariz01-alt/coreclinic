<span class="font-['Inter'] text-[10px] font-medium uppercase tracking-widest mt-1">Agenda</span>
</a>

<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">group</span>

<span class="font-['Inter'] text-[10px] font-medium uppercase tracking-widest mt-1">Procedimentos</span>
</a>

<script>
  const SUPABASE_URL = 'https://wcmowsufrfrjajxpmcgn.supabase.co';
  const SUPABASE_ANON_KEY = 'sb_publishable_onLuRLfVbViEQv2hdEuHtw_AbtPEr67';
  const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  function escapeHtml(value) {
    return String(value ?? '')
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }

  function formatCurrency(value) {
    return value.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
  }

  function formatDateShort(dateStr) {
    if (!dateStr) return '—';
    const date = new Date(dateStr);
    return date.toLocaleDateString('pt-BR', { day: '2-digit', month: 'short' }).replace('.', '');
  }

  function formatDateFull(dateStr) {
    if (!dateStr) return '—';
    const date = new Date(dateStr);
    return date.toLocaleDateString('pt-BR', { day: '2-digit', month: 'short', year: 'numeric' }).replace('.', '');
  }

  function getInitials(nome) {
    if (!nome) return '—';
    const parts = nome.trim().split(/\s+/);
    if (parts.length === 1) return parts[0].charAt(0).toUpperCase();
    return (parts[0].charAt(0) + parts[parts.length - 1].charAt(0)).toUpperCase();
  }

  function getStatusBadgeClass(status) {
    if (status === 'concluido') {
      return 'bg-tertiary-container text-on-tertiary-container text-[10px] px-2 py-0.5 rounded-full font-bold uppercase tracking-wider';
    } else if (status === 'cancelado') {
      return 'bg-error-container/30 text-error text-[10px] px-2 py-0.5 rounded-full font-bold uppercase tracking-wider';
    } else {
      return 'bg-surface-container text-on-surface-variant text-[10px] px-2 py-0.5 rounded-full font-bold uppercase tracking-wider';
    }
  }

  function getStatusLabel(status) {
    const labels = {
      concluido: 'Concluído',
      cancelado: 'Cancelado',
      agendado: 'Agendado',
      confirmado: 'Confirmado',
      em_andamento: 'Em andamento',
    };
    return labels[status] || escapeHtml(status || '');
  }

  function renderTimeline(agendamentos, pagamentosMap) {
    const container = document.getElementById('timeline-list');

    if (!agendamentos || agendamentos.length === 0) {
      container.innerHTML = '<p class="text-sm text-on-surface-variant text-center py-8">Nenhuma consulta registrada.</p>';
      return;
    }

    const dotConcluido = 'w-2 h-2 rounded-full bg-primary mt-2';
    const dotOther = 'w-2 h-2 rounded-full bg-outline-variant mt-2';

    container.innerHTML = agendamentos.map(ag => {
      const isConcluido = ag.status === 'concluido';
      const dotClass = isConcluido ? dotConcluido : dotOther;
      const badgeClass = getStatusBadgeClass(ag.status);
      const statusLabel = getStatusLabel(ag.status);
      const dateFull = formatDateFull(ag.inicio);
      const valor = pagamentosMap[ag.id] !== undefined
        ? `R$ ${Number(pagamentosMap[ag.id]).toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 })}`
        : '—';
      const procedimentoNome = escapeHtml(ag.procedimento_nome || '—');
      const statusLabelSafe = escapeHtml(statusLabel);
      const dateFullSafe = escapeHtml(dateFull);
      const valorSafe = escapeHtml(valor);

      return `
        <div class="flex gap-4">
          <div class="flex flex-col items-center">
            <div class="${dotClass}"></div>
            <div class="w-0.5 h-full bg-surface-container"></div>
          </div>
          <div class="bg-surface-container-lowest p-4 rounded-xl flex-1 shadow-[0px_12px_32px_rgba(48,51,53,0.06)] mb-4">
            <div class="flex justify-between items-start">
              <div>
                <p class="headline-font font-bold text-sm">${procedimentoNome}</p>
                <p class="font-body text-xs text-on-surface-variant mt-0.5">${statusLabelSafe}</p>
              </div>
              <span class="${badgeClass}">${statusLabelSafe}</span>
            </div>
            <div class="mt-3 flex gap-4">
              <div class="flex items-center gap-1 text-[10px] text-on-surface-variant">
                <span class="material-symbols-outlined text-xs">history</span>
                ${dateFullSafe}
              </div>
              <div class="flex items-center gap-1 text-[10px] text-on-surface-variant">
                <span class="material-symbols-outlined text-xs">payments</span>
                ${valorSafe}
              </div>
            </div>
          </div>
        </div>
      `;
    }).join('');
  }

  async function init() {
    // 1. Check session
    const session = await new Promise((resolve) => {
      const { data: { subscription } } = _supabase.auth.onAuthStateChange((event, sess) => {
        if (event === 'INITIAL_SESSION') { subscription.unsubscribe(); resolve(sess); }
      });
    });
    if (!session) {
      window.location.href = 'login-mobile.html';
      return;
    }

    // 2. Get patient ID from URL
    const params = new URLSearchParams(window.location.search);
    const patientId = params.get('id');
    if (!patientId) {
      window.location.href = 'pacientes-mobile.html';
      return;
    }

    // 3. Load patient
    const { data: patient, error: patientError } = await _supabase
      .from('pacientes')
      .select('*')
      .eq('id', patientId)
      .single();

    if (patientError || !patient) {
      window.location.href = 'pacientes-mobile.html';
      return;
    }

    // 4. Load appointments
    const { data: agendamentos } = await _supabase
      .from('agendamentos')
      .select('*')
      .eq('paciente_id', patientId)
      .order('inicio', { ascending: false });

    const agendamentosList = agendamentos || [];

    // 5. Load payments
    let pagamentos = [];
    if (agendamentosList.length > 0) {
      const ids = agendamentosList.map(a => a.id);
      const { data: pags } = await _supabase
        .from('pagamentos')
        .select('valor, status, agendamento_id')
        .in('agendamento_id', ids);
      pagamentos = pags || [];
    }

    // 6. Calculate faturamento total (only paid)
    const faturamentoTotal = pagamentos
      .filter(p => p.status === 'pago')
      .reduce((sum, p) => sum + Number(p.valor || 0), 0);

    // Build a map agendamento_id -> valor_cobrado (first payment found)
    const pagamentosMap = {};
    pagamentos.forEach(p => {
      if (pagamentosMap[p.agendamento_id] === undefined) {
        pagamentosMap[p.agendamento_id] = p.valor;
      }
    });

    // 7. Update DOM
    const initials = getInitials(patient.nome);
    document.getElementById('patient-avatar').textContent = initials;
    document.getElementById('patient-name').textContent = patient.nome || '—';
    document.getElementById('patient-id').textContent = `#${patient.id.substring(0, 8).toUpperCase()}-PR`;
    document.getElementById('faturamento-total').textContent = formatCurrency(faturamentoTotal);
    document.getElementById('patient-tier').textContent = faturamentoTotal > 2000 ? 'Premium' : 'Regular';

    const ultimoAg = agendamentosList[0];
    document.getElementById('ultimo-procedimento').textContent = ultimoAg?.procedimento_nome || '—';
    document.getElementById('ultima-data').textContent = ultimoAg ? formatDateShort(ultimoAg.inicio) : '—';

    // 8. Render timeline
    renderTimeline(agendamentosList, pagamentosMap);
  }

  init();
</script>
</body></html>
