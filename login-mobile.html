<!DOCTYPE html>
<html class="light" lang="pt-br"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
  tailwind.config = {
    darkMode: "class",
    theme: {
      extend: {
        "colors": {
          "on-tertiary-fixed-variant": "#643e5d","tertiary-fixed-dim": "#deadd1","surface-container-lowest": "#ffffff","secondary-container": "#ffdad9","error-container": "#fd795a","secondary-fixed-dim": "#f5caca","secondary": "#775757","primary-fixed-dim": "#ec5f8f","on-secondary": "#fff7f6","surface-bright": "#faf9fa","outline-variant": "#b0b2b5","tertiary-dim": "#6d4665","on-tertiary-fixed": "#44223f","primary": "#ac2d5e","inverse-on-surface": "#9d9d9e","background": "#faf9fa","surface-container": "#edeef0","on-tertiary": "#fff7f9","error": "#a73b21","secondary-dim": "#6a4b4b","on-primary-fixed": "#000000","tertiary-fixed": "#ecbadf","on-error-container": "#6e1400","surface-container-low": "#f3f3f5","on-primary-container": "#47001f","on-background": "#303335","inverse-surface": "#0d0e0f","surface-tint": "#ac2d5e","tertiary-container": "#ecbadf","on-tertiary-container": "#5b3654","surface-variant": "#e1e3e5","on-error": "#fff7f6","on-surface-variant": "#5c5f62","on-secondary-fixed-variant": "#735354","surface-container-highest": "#e1e3e5","on-surface": "#303335","surface": "#faf9fa","primary-dim": "#9c1f52","on-secondary-container": "#694a4a","primary-fixed": "#fd6c9c","on-primary-fixed-variant": "#590029","error-dim": "#791903","primary-container": "#fd6c9c","on-primary": "#fff7f7","secondary-fixed": "#ffdad9","tertiary": "#7a5272","inverse-primary": "#fd6c9c","surface-container-high": "#e7e8ea","surface-dim": "#d8dadd","on-secondary-fixed": "#543838","outline": "#787b7d"
        },
        "borderRadius": {"DEFAULT": "0.25rem","lg": "0.5rem","xl": "0.75rem","full": "9999px"},
        "fontFamily": {"headline": ["Manrope"],"body": ["Inter"],"label": ["Inter"]}
      },
    },
  }
</script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
  .btn-gradient { background: linear-gradient(135deg, #ac2d5e 0%, #fd6c9c 100%); }
</style>
</head>
<body class="bg-surface font-body text-on-surface min-h-screen flex flex-col">
<main class="flex-grow flex flex-col justify-center px-8 py-12">
<div class="max-w-md w-full mx-auto space-y-12">
<header class="flex flex-col items-center text-center space-y-4">
<div class="w-16 h-16 bg-surface-container-low rounded-xl flex items-center justify-center">
<span class="material-symbols-outlined text-primary text-4xl">bubble_chart</span>
</div>
<div class="space-y-1">
<h1 class="font-headline font-extrabold text-3xl tracking-tight text-primary">Core Clinic</h1>
<p class="font-label text-on-surface-variant text-sm uppercase tracking-[0.1em]">Gestão em Saúde</p>
</div>
</header>
<section class="bg-surface-container-lowest rounded-xl p-6 space-y-8">
<div class="space-y-2">
<h2 class="font-headline font-bold text-xl text-on-surface">Bem-vindo de volta</h2>
<p class="font-body text-sm text-on-surface-variant">Entre com suas credenciais para continuar.</p>
</div>
<form class="space-y-6" id="login-form">
<div class="space-y-4">
<div class="space-y-1.5">
<label class="font-label text-xs font-semibold text-on-surface-variant uppercase tracking-wider ml-1" for="email">E-mail Profissional</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline text-lg transition-colors group-focus-within:text-primary">mail</span>
<input class="w-full bg-surface-container-low border-none rounded-xl py-4 pl-12 pr-4 text-sm focus:ring-2 focus:ring-primary-fixed-dim/30 focus:bg-surface-container-lowest transition-all outline-none text-on-surface placeholder:text-outline/60" id="email" placeholder="nome@coreclinic.com" type="email" required/>
</div>
</div>
<div class="space-y-1.5">
<label class="font-label text-xs font-semibold text-on-surface-variant uppercase tracking-wider ml-1" for="password">Senha</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline text-lg transition-colors group-focus-within:text-primary">lock</span>
<input class="w-full bg-surface-container-low border-none rounded-xl py-4 pl-12 pr-12 text-sm focus:ring-2 focus:ring-primary-fixed-dim/30 focus:bg-surface-container-lowest transition-all outline-none text-on-surface placeholder:text-outline/60" id="password" placeholder="••••••••" type="password" required/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-outline hover:text-on-surface transition-colors" type="button" id="toggle-password">
<span class="material-symbols-outlined text-lg" id="toggle-icon">visibility</span>
</button>
</div>
</div>
</div>
<div class="flex items-center justify-between">
<label class="flex items-center space-x-3 cursor-pointer group">
<div class="relative">
<input class="peer sr-only" type="checkbox" id="remember"/>
<div class="w-5 h-5 bg-surface-container-high rounded-lg peer-checked:bg-primary transition-colors flex items-center justify-center">
<span class="material-symbols-outlined text-white text-xs scale-0 peer-checked:scale-100 transition-transform" style="font-variation-settings: 'FILL' 1;">check</span>
</div>
</div>
<span class="text-sm font-medium text-on-surface-variant group-hover:text-on-surface transition-colors">lembrar de mim</span>
</label>
<a class="text-sm font-semibold text-primary hover:text-primary-dim transition-colors cursor-pointer" id="forgot-link">Esqueceu a senha?</a>
</div>
<button class="btn-gradient w-full py-4 rounded-full text-white font-headline font-bold text-base shadow-[0px_12px_32px_rgba(172,45,94,0.15)] active:scale-95 transition-all" type="submit" id="submit-btn">
Acessar Dashboard
</button>
</form>
</section>
<footer class="text-center">
<p class="text-sm text-on-surface-variant">
Ainda não tem uma conta?
<a class="text-primary font-bold ml-1" href="#">Fale com o suporte</a>
</p>
</footer>
</div>
</main>
<div class="absolute inset-0 -z-10 overflow-hidden pointer-events-none">
<div class="absolute -top-[10%] -right-[10%] w-[40%] h-[40%] bg-primary-container/10 blur-[120px] rounded-full"></div>
<div class="absolute -bottom-[10%] -left-[10%] w-[40%] h-[40%] bg-tertiary-container/10 blur-[120px] rounded-full"></div>
</div>

<script>
  const SUPABASE_URL = 'https://wcmowsufrfrjajxpmcgn.supabase.co';
  const SUPABASE_ANON_KEY = 'sb_publishable_onLuRLfVbViEQv2hdEuHtw_AbtPEr67';
  const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  // Toast helper
  function showToast(message, type = 'error') {
    const existing = document.getElementById('toast');
    if (existing) existing.remove();

    const toast = document.createElement('div');
    toast.id = 'toast';
    const bgColor = type === 'error' ? 'bg-[#a73b21]' : 'bg-[#ac2d5e]';
    toast.className = `fixed bottom-4 left-1/2 -translate-x-1/2 z-50 px-5 py-3 rounded-full text-white text-sm font-semibold shadow-lg transition-all duration-300 ${bgColor}`;
    toast.textContent = message;
    document.body.appendChild(toast);

    setTimeout(() => {
      toast.style.opacity = '0';
      setTimeout(() => toast.remove(), 300);
    }, 3500);
  }

  // Check session on load
  (async () => {
    const { data: { session } } = await supabase.auth.getSession();
    if (session) {
      window.location.href = 'dashboard-mobile.html';
    }
  })();

  // Toggle password visibility
  const toggleBtn = document.getElementById('toggle-password');
  const toggleIcon = document.getElementById('toggle-icon');
  const passwordInput = document.getElementById('password');

  toggleBtn.addEventListener('click', () => {
    const isPassword = passwordInput.type === 'password';
    passwordInput.type = isPassword ? 'text' : 'password';
    toggleIcon.textContent = isPassword ? 'visibility_off' : 'visibility';
  });

  // Forgot password
  document.getElementById('forgot-link').addEventListener('click', async () => {
    const email = document.getElementById('email').value.trim();
    if (!email) {
      showToast('Insira seu e-mail para redefinir a senha.', 'error');
      return;
    }
    const { error } = await supabase.auth.resetPasswordForEmail(email);
    if (error) {
      showToast('Erro ao enviar e-mail de redefinição.', 'error');
    } else {
      showToast('E-mail de redefinição enviado!', 'success');
    }
  });

  // Login form submit
  document.getElementById('login-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const submitBtn = document.getElementById('submit-btn');

    submitBtn.disabled = true;
    submitBtn.textContent = 'Entrando...';

    const { error } = await supabase.auth.signInWithPassword({ email, password });

    if (error) {
      showToast(error.message === 'Invalid login credentials'
        ? 'E-mail ou senha incorretos.'
        : error.message, 'error');
      submitBtn.disabled = false;
      submitBtn.textContent = 'Acessar Dashboard';
    } else {
      window.location.href = 'dashboard-mobile.html';
    }
  });
</script>
</body></html>
