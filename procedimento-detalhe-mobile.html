<!DOCTYPE html>
<html class="light" lang="pt-BR">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Core Clinic — Procedimento</title>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Manrope:wght@700;800&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script id="tailwind-config">
  tailwind.config = {
    darkMode: "class",
    theme: {
      extend: {
        colors: {
          "on-tertiary-fixed-variant":"#643e5d","tertiary-fixed-dim":"#deadd1","surface-container-lowest":"#ffffff","secondary-container":"#ffdad9","error-container":"#fd795a","secondary-fixed-dim":"#f5caca","secondary":"#775757","primary-fixed-dim":"#ec5f8f","on-secondary":"#fff7f6","surface-bright":"#faf9fa","outline-variant":"#b0b2b5","tertiary-dim":"#6d4665","on-tertiary-fixed":"#44223f","primary":"#ac2d5e","inverse-on-surface":"#9d9d9e","background":"#faf9fa","surface-container":"#edeef0","on-tertiary":"#fff7f9","error":"#a73b21","secondary-dim":"#6a4b4b","on-primary-fixed":"#000000","tertiary-fixed":"#ecbadf","on-error-container":"#6e1400","surface-container-low":"#f3f3f5","on-primary-container":"#47001f","on-background":"#303335","inverse-surface":"#0d0e0f","surface-tint":"#ac2d5e","tertiary-container":"#ecbadf","on-tertiary-container":"#5b3654","surface-variant":"#e1e3e5","on-error":"#fff7f6","on-secondary-fixed-variant":"#735354","surface-container-highest":"#e1e3e5","on-surface":"#303335","surface":"#faf9fa","primary-dim":"#9c1f52","on-secondary-container":"#694a4a","primary-fixed":"#fd6c9c","on-primary-fixed-variant":"#590029","error-dim":"#791903","primary-container":"#fd6c9c","on-primary":"#fff7f7","secondary-fixed":"#ffdad9","tertiary":"#7a5272","inverse-primary":"#fd6c9c","surface-container-high":"#e7e8ea","surface-dim":"#d8dadd","on-secondary-fixed":"#543838","outline":"#787b7d"
        },
        borderRadius: {"DEFAULT":"0.25rem","lg":"0.5rem","xl":"0.75rem","full":"9999px"},
        fontFamily: {"headline":["Manrope"],"body":["Inter"],"label":["Inter"]}
      },
    },
  }
</script>
<style>
  .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
  .btn-gradient { background: linear-gradient(135deg, #ac2d5e 0%, #fd6c9c 100%); }
  body { min-height: max(884px, 100dvh); font-family: 'Inter', sans-serif; }
  h1, h2, h3 { font-family: 'Manrope', sans-serif; }
</style>
</head>
<body class="bg-surface text-on-surface min-h-screen pb-32">

<!-- TopAppBar -->
<header class="w-full top-0 sticky z-50 bg-[#faf9fa] flex items-center justify-between px-6 py-4">
  <div class="flex items-center gap-4">
    <a href="procedimentos-mobile.html" class="active:scale-95 duration-200 text-[#ac2d5e] flex items-center justify-center">
      <span class="material-symbols-outlined">arrow_back</span>
    </a>
    <h1 class="font-['Manrope'] font-bold text-lg tracking-tight" id="page-title">Editar Procedimento</h1>
  </div>
  <button onclick="salvar()" id="btn-salvar" class="active:scale-95 duration-200 text-[#ac2d5e] font-bold font-['Manrope'] px-4 py-1 rounded-full hover:bg-[#f3f3f5] transition-colors">
    Salvar
  </button>
</header>

<!-- Toast -->
<div id="toast" class="hidden fixed top-20 left-1/2 -translate-x-1/2 z-50 px-5 py-2 rounded-full text-sm font-semibold shadow-lg"></div>

<main class="px-6 pt-4 space-y-8">

  <!-- Image Section -->
  <section class="flex flex-col items-center gap-4">
    <div class="relative group" onclick="document.getElementById('input-imagem').click()">
      <div class="w-32 h-32 rounded-xl overflow-hidden bg-surface-container-low border border-outline-variant/15">
        <img id="preview-imagem" class="w-full h-full object-cover" src="" alt="Imagem do Procedimento"/>
      </div>
      <button type="button" class="absolute -bottom-2 -right-2 bg-primary text-on-primary w-10 h-10 rounded-full flex items-center justify-center shadow-lg active:scale-95 transition-transform pointer-events-none">
        <span class="material-symbols-outlined text-sm">photo_camera</span>
      </button>
    </div>
    <input type="file" id="input-imagem" accept="image/*" class="hidden" onchange="previewImagem(this)"/>
    <p class="text-xs font-label uppercase tracking-widest text-on-surface-variant">Toque para alterar a foto</p>
    <p class="text-[10px] text-primary font-medium text-center" id="imagem-status"></p>
  </section>

  <!-- Form -->
  <form class="space-y-6" onsubmit="return false">

    <div class="space-y-2">
      <label class="text-[10px] font-label font-semibold uppercase tracking-[0.1em] text-on-surface-variant ml-1">Nome do Procedimento</label>
      <input id="campo-nome" class="w-full bg-surface-container-low border-none rounded-xl px-4 py-4 focus:ring-2 focus:ring-primary-fixed-dim/30 focus:bg-surface-container-lowest transition-all text-on-surface outline-none" type="text" placeholder="Nome do procedimento"/>
    </div>

    <div class="space-y-2">
      <label class="text-[10px] font-label font-semibold uppercase tracking-[0.1em] text-on-surface-variant ml-1">Descrição Detalhada</label>
      <textarea id="campo-descricao" class="w-full bg-surface-container-low border-none rounded-xl px-4 py-4 focus:ring-2 focus:ring-primary-fixed-dim/30 focus:bg-surface-container-lowest transition-all text-on-surface outline-none resize-none" rows="4" placeholder="Descreva o procedimento..."></textarea>
    </div>

    <div class="grid grid-cols-5 gap-4">
      <div class="col-span-3 space-y-2">
        <label class="text-[10px] font-label font-semibold uppercase tracking-[0.1em] text-on-surface-variant ml-1">Valor (R$)</label>
        <div class="relative">
          <span class="absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant font-medium">R$</span>
          <input id="campo-valor" class="w-full bg-surface-container-low border-none rounded-xl pl-11 pr-4 py-4 focus:ring-2 focus:ring-primary-fixed-dim/30 focus:bg-surface-container-lowest transition-all text-on-surface outline-none" type="text" placeholder="0,00"/>
        </div>
      </div>
      <div class="col-span-2 space-y-2">
        <label class="text-[10px] font-label font-semibold uppercase tracking-[0.1em] text-on-surface-variant ml-1">Tempo (min)</label>
        <div class="relative">
          <span class="absolute right-4 top-1/2 -translate-y-1/2 text-on-surface-variant font-medium text-sm">min</span>
          <input id="campo-duracao" class="w-full bg-surface-container-low border-none rounded-xl px-4 py-4 focus:ring-2 focus:ring-primary-fixed-dim/30 focus:bg-surface-container-lowest transition-all text-on-surface outline-none" type="number" placeholder="0"/>
        </div>
      </div>
    </div>

    <!-- Categoria -->
    <div class="bg-surface-container-lowest rounded-xl p-4 border border-outline-variant/15">
      <label class="text-[10px] font-label font-semibold uppercase tracking-[0.1em] text-on-surface-variant mb-2 block">Categoria</label>
      <select id="campo-categoria" class="w-full bg-transparent border-none text-on-surface font-semibold font-headline focus:ring-0 outline-none p-0">
        <option value="">Selecionar...</option>
        <option value="Estética Facial">Estética Facial</option>
        <option value="Injetáveis">Injetáveis</option>
        <option value="Renovação">Renovação</option>
        <option value="Harmonização">Harmonização</option>
        <option value="Corporal">Corporal</option>
        <option value="Capilar">Capilar</option>
        <option value="Geral">Geral</option>
      </select>
    </div>

    <!-- Características -->
    <div class="space-y-2">
      <label class="text-[10px] font-label font-semibold uppercase tracking-[0.1em] text-on-surface-variant ml-1">Características</label>
      <textarea id="campo-caracteristicas" class="w-full bg-surface-container-low border-none rounded-xl px-4 py-4 focus:ring-2 focus:ring-primary-fixed-dim/30 focus:bg-surface-container-lowest transition-all text-on-surface outline-none resize-none text-sm" rows="3" placeholder="Liste as características..."></textarea>
    </div>

    <!-- Preparação -->
    <div class="space-y-2">
      <label class="text-[10px] font-label font-semibold uppercase tracking-[0.1em] text-on-surface-variant ml-1">Preparação</label>
      <textarea id="campo-preparacao" class="w-full bg-surface-container-low border-none rounded-xl px-4 py-4 focus:ring-2 focus:ring-primary-fixed-dim/30 focus:bg-surface-container-lowest transition-all text-on-surface outline-none resize-none text-sm" rows="3" placeholder="Instruções de preparação..."></textarea>
    </div>

    <!-- Cuidados Pós -->
    <div class="space-y-2">
      <label class="text-[10px] font-label font-semibold uppercase tracking-[0.1em] text-on-surface-variant ml-1">Cuidados Pós-Procedimento</label>
      <textarea id="campo-cuidados-pos" class="w-full bg-surface-container-low border-none rounded-xl px-4 py-4 focus:ring-2 focus:ring-primary-fixed-dim/30 focus:bg-surface-container-lowest transition-all text-on-surface outline-none resize-none text-sm" rows="4" placeholder="Cuidados após o procedimento..."></textarea>
    </div>

    <div class="pb-8"></div>
  </form>
</main>

<!-- BottomNavBar -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-4 pb-6 pt-3 bg-white/80 backdrop-blur-xl border-t border-[#b0b2b5]/15 shadow-[0px_-12px_32px_rgba(48,51,53,0.06)] rounded-t-[1.5rem]">
  <a href="dashboard-mobile.html" class="flex flex-col items-center justify-center text-[#303335]/60 hover:opacity-80 transition-all duration-300 ease-out">
    <span class="material-symbols-outlined">dashboard</span>
    <span class="font-['Inter'] text-[11px] font-medium uppercase tracking-wider">Início</span>
  </a>
  <a href="agenda-mobile.html" class="flex flex-col items-center justify-center text-[#303335]/60 hover:opacity-80 transition-all duration-300 ease-out">
    <span class="material-symbols-outlined">calendar_today</span>
    <span class="font-['Inter'] text-[11px] font-medium uppercase tracking-wider">Agenda</span>
  </a>
  <a href="pacientes-mobile.html" class="flex flex-col items-center justify-center text-[#303335]/60 hover:opacity-80 transition-all duration-300 ease-out">
    <span class="material-symbols-outlined">person</span>
    <span class="font-['Inter'] text-[11px] font-medium uppercase tracking-wider">Pacientes</span>
  </a>
  <a href="procedimentos-mobile.html" class="flex flex-col items-center justify-center bg-[#fce4ec] text-[#ac2d5e] rounded-2xl px-4 py-2 hover:opacity-80 transition-all duration-300 ease-out">
    <span class="material-symbols-outlined" style="font-variation-settings:'FILL' 1;">medical_services</span>
    <span class="font-['Inter'] text-[11px] font-medium uppercase tracking-wider">Ajustes</span>
  </a>
</nav>

<script>
  const SUPABASE_URL = 'https://wcmowsufrfrjajxpmcgn.supabase.co';
  const SUPABASE_ANON_KEY = 'sb_publishable_onLuRLfVbViEQv2hdEuHtw_AbtPEr67';
  const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  const params = new URLSearchParams(window.location.search);
  const procedimentoId = params.get('id');
  let arquivoImagem = null;
  const imgPadrao = 'https://lh3.googleusercontent.com/aida-public/AB6AXuCB6Vnpn5-GpXY4X2ItYvcu2fsFzdW2ZgsnVCUq06MVignpb4H2A3br__pc7ZQHiOl8eBbJBpRH3IJqZg86afvAHX5yy4BX6upDb6IsukePfexhApcpP_DuDv8B0wj2HYCaE5-zLC2bOOHcaQ2TEXjzTrpbNvrKT2C6sS1q-HKCMJ9SgcpBAYuQk2nMJPh2c5Ou9AC4JXWpfYWsnD2PGW4PMmsCTqKXWrccM3nofUZulRCXlLdNJFGnztTTSmVp6CMuFZZ_8i2aNcSd';

  function mostrarToast(msg, tipo) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = `fixed top-20 left-1/2 -translate-x-1/2 z-50 px-5 py-2 rounded-full text-sm font-semibold shadow-lg ${tipo === 'ok' ? 'bg-green-100 text-green-800' : 'bg-red-100 text-red-800'}`;
    t.classList.remove('hidden');
    setTimeout(() => t.classList.add('hidden'), 3000);
  }

  function previewImagem(input) {
    if (!input.files || !input.files[0]) return;
    arquivoImagem = input.files[0];
    const reader = new FileReader();
    reader.onload = e => {
      document.getElementById('preview-imagem').src = e.target.result;
      document.getElementById('imagem-status').textContent = 'Nova imagem selecionada';
    };
    reader.readAsDataURL(arquivoImagem);
  }

  async function uploadImagem(id) {
    if (!arquivoImagem) return null;
    const ext = arquivoImagem.name.split('.').pop();
    const path = `procedimentos/${id}.${ext}`;
    const { error } = await _supabase.storage
      .from('procedimentos-imagens')
      .upload(path, arquivoImagem, { upsert: true, contentType: arquivoImagem.type });
    if (error) throw new Error('Erro no upload: ' + error.message);
    const { data } = _supabase.storage.from('procedimentos-imagens').getPublicUrl(path);
    return data.publicUrl;
  }

  async function carregarProcedimento() {
    if (!procedimentoId) {
      document.getElementById('page-title').textContent = 'Novo Procedimento';
      document.getElementById('preview-imagem').src = imgPadrao;
      return;
    }

    const { data, error } = await _supabase
      .from('procedimentos')
      .select('*')
      .eq('id', procedimentoId)
      .single();

    if (error || !data) {
      mostrarToast('Procedimento não encontrado.', 'erro');
      return;
    }

    document.getElementById('campo-nome').value = data.nome || '';
    document.getElementById('campo-descricao').value = data.descricao || '';
    document.getElementById('campo-valor').value = data.valor != null ? Number(data.valor).toFixed(2).replace('.', ',') : '';
    document.getElementById('campo-duracao').value = data.duracao_minutos || '';
    document.getElementById('campo-categoria').value = data.categoria || '';
    document.getElementById('campo-caracteristicas').value = data.caracteristicas || '';
    document.getElementById('campo-preparacao').value = data.preparacao || '';
    document.getElementById('campo-cuidados-pos').value = data.cuidados_pos || '';
    document.getElementById('preview-imagem').src = data.imagem_url || imgPadrao;
  }

  async function salvar() {
    const btn = document.getElementById('btn-salvar');
    btn.disabled = true;
    btn.textContent = '...';

    try {
      const valorStr = document.getElementById('campo-valor').value.replace('.', '').replace(',', '.');
      const payload = {
        nome: document.getElementById('campo-nome').value.trim(),
        descricao: document.getElementById('campo-descricao').value.trim(),
        valor: parseFloat(valorStr) || 0,
        duracao_minutos: parseInt(document.getElementById('campo-duracao').value) || 0,
        categoria: document.getElementById('campo-categoria').value,
        caracteristicas: document.getElementById('campo-caracteristicas').value.trim(),
        preparacao: document.getElementById('campo-preparacao').value.trim(),
        cuidados_pos: document.getElementById('campo-cuidados-pos').value.trim(),
      };

      if (!payload.nome) {
        mostrarToast('Nome obrigatório.', 'erro');
        return;
      }

      let id = procedimentoId;

      if (id) {
        if (arquivoImagem) {
          const url = await uploadImagem(id);
          payload.imagem_url = url;
        }
        const { error } = await _supabase.from('procedimentos').update(payload).eq('id', id);
        if (error) throw error;
      } else {
        const { data: inserted, error } = await _supabase.from('procedimentos').insert({ ...payload, ativo: true }).select().single();
        if (error) throw error;
        id = inserted.id;
        if (arquivoImagem) {
          const url = await uploadImagem(id);
          await _supabase.from('procedimentos').update({ imagem_url: url }).eq('id', id);
        }
      }

      mostrarToast('Salvo com sucesso!', 'ok');
      setTimeout(() => window.location.href = `procedimento-detalhe-mobile.html?id=${id}`, 1500);
    } catch (err) {
      mostrarToast('Erro: ' + err.message, 'erro');
    } finally {
      btn.disabled = false;
      btn.textContent = 'Salvar';
    }
  }

  (async () => {
    const { data: { session } } = await _supabase.auth.getSession();
    if (!session) { window.location.href = 'login-mobile.html'; return; }
    await carregarProcedimento();
  })();
</script>
</body>
</html>
